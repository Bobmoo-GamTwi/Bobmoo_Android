name: 📋 Task
description: Feature/Fix/Refactor/Style/Chore 통합 작업 템플릿
title: "[Feature|Fix|Refactor|Style|Chore] "
labels: []

body:
  - type: markdown
    attributes:
      value: |
        이슈 제목은 아래 형식으로 작성해주세요.
        - `[Feature] ...`
        - `[Fix] ...`
        - `[Refactor] ...`
        - `[Style] ...`
        - `[Chore] ...`

  - type: textarea
    id: summary
    attributes:
      label: 📌 작업 요약
      description: 무엇을 작업하는지 한두 문장으로 작성해주세요.
      placeholder: 예) 홈 화면 식단 카드 레이아웃 개선 및 상태 처리 수정
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: ✔️ To-Do (완료 기준)
      description: 완료 기준을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] 작업 항목 1
        - [ ] 작업 항목 2
        - [ ] 테스트/검증
    validations:
      required: true

  - type: checkboxes
    id: impact
    attributes:
      label: 📱 영향 범위
      description: 해당되는 항목을 선택해주세요.
      options:
        - label: UI 변경
        - label: API 연동
        - label: 상태관리 변경
        - label: 빌드 설정 변경
        - label: 의존성 변경
        - label: 데이터 구조 변경

  - type: textarea
    id: capture
    attributes:
      label: 📝 작업 페이지 캡처 (선택)
      description: 필요한 경우 캡처나 피그마 링크를 작성해주세요.
      placeholder: |
        | 페이지 | 캡처 |
        | :---: | :---: |
        | 피그마 | <img src="" width="250"> |
